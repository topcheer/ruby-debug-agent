# ─────────────────────────────────────────────────────────────────
# CI — build and verify on every push/PR
# ─────────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.0', '3.1', '3.2', '3.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: false

      - name: Install dependencies
        run: bundle install || gem install json sinatra

      - name: Syntax check
        run: |
          for f in $(find lib -name '*.rb'); do ruby -c "$f"; done

      - name: Verify tool registry
        run: |
          ruby -Ilib -e "
            require 'debug_agent'
            count = DebugAgent.registry.names.length
            raise \"Expected 20+ tools, got #{count}\" if count < 20
            puts \"OK: #{count} tools registered\"
          "

      - name: Build gem
        run: gem build debug-agent.gemspec
