# ─────────────────────────────────────────────────────────────────
# gem-publish — Push a tag `v1.2.3` to publish to RubyGems
#
# Usage:
#   git tag v0.2.0
#   git push origin v0.2.0
#
# Uses RubyGems Trusted Publishing (OIDC) — no API key needed.
# Configure at: https://rubygems.org/gems/debug-agent/trusted_publishers
#   Repository owner: topcheer
#   Repository name: ruby-debug-agent
#   Workflow filename: gem-publish.yml
#   Environment: release
# ─────────────────────────────────────────────────────────────────
name: gem

on:
  push:
    tags: ["v*"]

concurrency:
  group: publish-gem-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  push:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: false

      - name: Sync version from tag
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "Tag: $TAG  Version: $VERSION"
          sed -i "s/VERSION = .*/VERSION = '${VERSION}'.freeze/" lib/debug_agent/version.rb
          cat lib/debug_agent/version.rb

      - name: Build gem
        run: gem build debug-agent.gemspec

      - name: Release gem
        uses: rubygems/release-gem@v1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ### RubyGems
            ```ruby
            gem 'debug-agent', '~> ${{ github.ref_name }}
            ```
